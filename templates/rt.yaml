AWSTemplateFormatVersion: '2010-09-09'
Description: Creates Public and Private Route Tables, associates them with subnets, and adds an S3 Gateway Endpoint

Parameters:
  VPCId:
    Type: String
    Description: The ID of the existing VPC

  PublicSubnetId:
    Type: String
    Description: The ID of the public subnet

  PrivateSubnetId:
    Type: String
    Description: The ID of the private subnet

  InternetGatewayId:
    Type: String
    Description: The ID of the Internet Gateway

Resources:
  ## 🛠️ Public Route Table
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPCId
      Tags:
        - Key: Name
          Value: PublicRouteTable

  ## 🔗 Public Route (Routes Internet Traffic to IGW)
  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGatewayId

  ## 🔗 Associate Public Subnet with Public Route Table
  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetId
      RouteTableId: !Ref PublicRouteTable

  ## 🛠️ Private Route Table
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPCId
      Tags:
        - Key: Name
          Value: PrivateRouteTable

  ## 🔗 Associate Private Subnet with Private Route Table
  PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetId
      RouteTableId: !Ref PrivateRouteTable

  ## 🌐 S3 Gateway Endpoint (Moved from S3EndpointStack)
  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPCId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable  # Attach to the private route table
      Tags:
        - Key: Name
          Value: S3GatewayEndpoint

Outputs:
  PublicRouteTableId:
    Description: The ID of the created Public Route Table
    Value: !Ref PublicRouteTable

  PrivateRouteTableId:
    Description: The ID of the Private Route Table
    Value: !Ref PrivateRouteTable

  S3EndpointId:
    Description: The ID of the S3 Gateway Endpoint
    Value: !Ref S3Endpoint
